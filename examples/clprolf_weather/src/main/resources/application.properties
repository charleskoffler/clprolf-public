logging.level.org.springframework=INFO
logging.level.org.clprolf.weatherapp=DEBUG
logging.level.com.zaxxer=ERROR
logging.level.root=ERROR

logging.level.org.springframework.transaction=INFO
logging.level.org.hibernate.transaction=INFO
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.engine.transaction.internal=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.hibernate.schema=DEBUG

spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

## MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/weatherobs?rewriteBatchedStatements=true&allowLoadLocalInfile=true

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=false
#logging.level.org.springframework.beans.factory.support=DEBUG
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#For batch inserts
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

#spring.jpa.properties.hibernate.generate_statistics=true

#Much logging
logging.level.org.hibernate=INFO
